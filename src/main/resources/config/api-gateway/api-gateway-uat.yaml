server:
  port: 2510
spring:
  application:
    name: api-gateway
  main:
    allow-bean-definition-overriding: true
    web-application-type: reactive
  r2dbc:
    url: r2dbc:postgresql://161.97.138.103:12009/cf_uat_db
    username: postgres
    password: CF@@2025
  data:
    redis:
      host: 161.97.138.103
      port: 6379
      timeout: 30000
      password: CF@2025
      ssl:
        enabled: false
  spring:
    zipkin:
      base-url: http://161.97.138.103:9411
logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId},%X{spanId}]"
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  upload:
    client:
      path: /image/**
    server:
      path: /opt/cambofreelance/upload/images/
springdoc:
