server:
  port: 8081
spring:
  application:
    name: msa-config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations:
            - classpath:config/game
            - classpath:config/user-service
management:
  endpoints:
    web:
      exposure:
        exclude: '*'
